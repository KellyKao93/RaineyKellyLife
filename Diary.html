<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR DIARY | Rainey and Kelly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FEFDF5; }
        .hero-title { font-family: 'Dela Gothic One', sans-serif; }
        .date-font { font-family: 'Playfair Display', serif; }

        .diary-card { transition: all 0.3s ease; }
        .diary-card:hover { transform: translateY(-5px); }

        /* 放大視窗 (Modal) 樣式 */
        #imgModal {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #modalImg {
            max-width: 90%;
            max-height: 80%;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        #imgModal.active #modalImg { transform: scale(1); }
    </style>
</head>
<body class="text-gray-800">

    <nav class="flex flex-col md:flex-row justify-between items-center px-6 md:px-10 py-6 gap-4">
        <div class="font-bold text-xl md:text-2xl text-[#FF8A8A] italic">
            Rainey and Kelly Story.
        </div>
        <div class="flex space-x-2 md:space-x-4">
            <a href="index.html" class="px-4 md:px-6 py-2 hover:bg-pink-100 rounded-full text-xs md:text-sm transition text-gray-600 font-medium">Home</a>
            <a href="Album.html" class="px-4 md:px-6 py-2 hover:bg-pink-100 rounded-full text-xs md:text-sm transition text-gray-600 font-medium">Album</a>
            <a href="Diary.html" class="px-4 md:px-6 py-2 bg-[#FF8A8A] text-white rounded-full text-xs md:text-sm shadow-md font-medium">Diary</a>
        </div>
    </nav>

    <header class="max-w-2xl mx-auto px-6 mb-8 mt-2 text-center">
        <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-lg border-4 border-[#FBCFE8]">
            <h1 class="hero-title text-4xl md:text-5xl text-[#FBCFE8] mb-2">DIARY</h1>
            <p class="text-gray-400 tracking-widest text-xs md:text-sm font-medium">紀錄我們的點點滴滴 💌</p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 pb-20 space-y-8">
        
        <article class="diary-card bg-white rounded-[2rem] shadow-md overflow-hidden border-2 border-transparent hover:border-[#FBCFE8]">
            <div class="p-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="date-font text-[#FF8A8A] text-xl font-bold">2026.04.05</span>
                    <span class="text-[10px] bg-pink-50 text-[#FF8A8A] px-3 py-1 rounded-full uppercase tracking-widest">浪漫na</span>
                </div>
                <h2 class="hero-title text-2xl text-gray-700 mb-4">還是會不自覺臉紅</h2>
                <p class="text-gray-500 leading-relaxed text-sm md:text-base">
                    書瑀，今天看到妳時，我真的很緊張，因為我很怕妳會拒絕我，雖然我表面很冷靜，但內心其實尖叫很大聲...
                </p>
                
                <div class="mt-6 pt-6 border-t border-dashed border-gray-100 flex items-center gap-4">
                    <div class="cursor-zoom-in" onclick="openModal('QRCode.png')">
                        <img src="QRCode.png" alt="QR Code" class="w-12 h-12 rounded-lg shadow-sm border border-gray-100 hover:opacity-80 transition">
                    </div>
                    <span class="text-xs text-gray-400 italic">掃描QRCode，我有話想對妳說 (點擊可放大)</span>
                </div>
            </div>
        </article>

        <article class="diary-card bg-white rounded-[2rem] shadow-md overflow-hidden border-2 border-transparent hover:border-[#BAE6FD]">
            <div class="p-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="date-font text-[#BAE6FD] text-xl font-bold">2026.04.xx</span>
                    <span class="text-[10px] bg-blue-50 text-[#BAE6FD] px-3 py-1 rounded-full uppercase tracking-widest">Sweet Day</span>
                </div>
                <h2 class="hero-title text-2xl text-gray-700 mb-4">待補</h2>
                <p class="text-gray-500 leading-relaxed text-sm md:text-base">
                    好浪漫na
                </p>
                <div class="mt-6 pt-6 border-t border-dashed border-gray-100 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-[#FBCFE8] flex items-center justify-center text-xs">☕</div>
                    <span class="text-xs text-gray-400 italic">c8</span>
                </div>
            </div>
        </article>

    </main>

    <div id="imgModal" onclick="closeModal()">
        <img id="modalImg" src="" alt="Enlarged QR Code">
    </div>

    <footer class="py-8 bg-white text-center text-[10px] tracking-widest text-gray-400 rounded-t-[2rem]">
        ❤️ 我們的小日常 ✨ <br>
        &copy; 2026 Rainey and Kelly. 保留所有權利。
    </footer>

    <script>
        function openModal(imgSrc) {
            const modal = document.getElementById('imgModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = imgSrc;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('imgModal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }
    </script>

</body>
</html>
