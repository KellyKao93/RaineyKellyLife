<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love | 貓貓狗狗紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FEFDF5; }
        
        /* 模仿圖片的深色卡片背景 */
        .widget-card {
            background-color: #33312E; /* 深咖啡灰色 */
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        /* 數字字體稍微大一點、清晰一點 */
        .timer-num {
            font-size: 5rem;
            line-height: 1;
            font-weight: 700;
            color: #FFFFFF;
        }

        /* 讓貓狗有一點點浮動的感覺 */
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: floating 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-4xl mx-auto flex justify-between items-center mb-10 px-4">
        <div class="text-xl font-bold text-gray-700">🐾 Home</div>
        <div class="space-x-4">
            <a href="moments.html" class="text-gray-400 hover:text-orange-400 transition">Moments</a>
            <a href="journal.html" class="text-gray-400 hover:text-orange-400 transition">Journal</a>
        </div>
    </nav>

    <header class="max-w-2xl mx-auto">
        <div class="widget-card p-10 md:p-16 text-center shadow-2xl flex items-center justify-between">
            
            <div class="animate-float" style="font-size: 80px;">
                🐱
                <div class="text-xs text-white opacity-60 mt-2">Meow!</div>
            </div>

            <div class="flex-1 px-4">
                <p class="text-white text-lg tracking-[0.5em] mb-2 font-light">LOVE</p>
                <div id="days-counter" class="timer-num">1</div>
                <p class="text-white text-sm mt-2 opacity-80">天</p>
                <div class="mt-6 border-t border-gray-600 pt-4">
                    <p class="text-white text-sm tracking-widest opacity-60">2026 / 04 / 02</p>
                </div>
            </div>

            <div class="animate-float" style="animation-delay: 0.5s; font-size: 80px;">
                🐶
                <div class="text-xs text-white opacity-60 mt-2">Woof!</div>
            </div>

        </div>
    </header>

    <section class="max-w-4xl mx-auto mt-12 grid grid-cols-1 md:grid-cols-2 gap-8 pb-20">
        <div class="group cursor-pointer bg-white rounded-3xl p-6 shadow-md border-2 border-transparent hover:border-orange-200 transition" onclick="location.href='moments.html'">
            <div class="rounded-2xl overflow-hidden h-40 bg-gray-100 mb-4">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover">
            </div>
            <h3 class="text-xl font-bold text-center text-gray-700">作品與照片集</h3>
        </div>

        <div class="group cursor-pointer bg-white rounded-3xl p-6 shadow-md border-2 border-transparent hover:border-orange-200 transition" onclick="location.href='journal.html'">
            <div class="rounded-2xl overflow-hidden h-40 bg-gray-100 mb-4">
                <img src="https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover">
            </div>
            <h3 class="text-xl font-bold text-center text-gray-700">心跳生活紀錄</h3>
        </div>
    </section>

    <script>
        // 計算天數：今天 2026-04-02 是第一天
        const startDate = new Date("2026-04-02T00:00:00");
        
        function updateCounter() {
            const now = new Date();
            // 計算相差的毫秒數
            const diffTime = now - startDate;
            // 轉換為天數，並無條件進位（因為今天算第1天）
            // 如果是 0.1 天，也會變成 1 天
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
            
            document.getElementById("days-counter").innerText = diffDays;
        }

        updateCounter();
        // 每天凌晨自動更新一次（雖然開網頁就會更新，但放著不關也會更新）
        setInterval(updateCounter, 3600000);
    </script>
</body>
</html>
