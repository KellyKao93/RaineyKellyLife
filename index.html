<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE STORY | 生活紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; }
        .hero-title { font-family: 'Dela Gothic One', sans-serif; }
        .days-num { font-family: 'Playfair Display', serif; }
        
        .hero-bg {
            background-color: #FEFDF5; /* 溫暖的米色背景 */
            background-size: cover;
            background-position: center;
        }

        .pulse-text {
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.03); }
        }
    </style>
</head>
<body class="text-gray-800">

    <nav class="flex justify-between items-center px-10 py-6 uppercase tracking-widest text-sm font-light">
        <div class="font-bold text-2xl text-[#FF8A8A] flex items-center">
            The Story.
        </div>
        <div class="space-x-4 flex">
            <a href="index.html" class="px-6 py-2 bg-[#FF8A8A] text-white rounded-full text-sm shadow-md font-medium">Home</a>
            <a href="moments.html" class="px-6 py-2 hover:bg-pink-100 rounded-full text-sm transition text-gray-600 font-medium">Moments</a>
            <a href="journal.html" class="px-6 py-2 hover:bg-pink-100 rounded-full text-sm transition text-gray-600 font-medium">Journal</a>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 mb-16 mt-8">
        <div class="bg-white p-16 md:p-24 rounded-[2rem] shadow-xl text-center border-4 border-[#BAE6FD]">
            
            <h1 class="hero-title text-6xl md:text-8xl text-[#FF8A8A] mb-12">LOVE</h1>
            
            <div class="flex flex-col items-center gap-2">
                <span id="days" class="days-num text-8xl md:text-9xl text-gray-800 font-bold pulse-text">000</span>
                <p class="hero-title text-xl mt-3 text-gray-500 tracking-wider">Days</p>
            </div>

            <p class="mt-16 text-lg text-gray-400 font-medium tracking-wide">Since 2026.04.02 — 這是我們故事</p>
        </div>
    </header>

    <section class="max-w-5xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-10 pb-20">
        
        <div class="group cursor-pointer bg-white rounded-3xl shadow-lg overflow-hidden border-2 border-transparent hover:border-[#BAE6FD] hover:shadow-2xl transition duration-300" onclick="location.href='moments.html'">
            <div class="aspect-[16/10] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80" 
                     class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-105 transition duration-500">
            </div>
            <div class="p-8 text-center">
                <h2 class="hero-title text-3xl text-[#0369A1] mb-2">Moments 閃照區</h2>
                <p class="text-gray-500 text-sm mb-4">紀錄每一場爬山與馬拉松的汗水</p>
                <span class="inline-block bg-[#BAE6FD] text-[#0369A1] px-8 py-2 rounded-full text-xs font-bold shadow-md">Go check!</span>
            </div>
        </div>

        <div class="group cursor-pointer bg-white rounded-3xl shadow-lg overflow-hidden border-2 border-transparent hover:border-[#FBCFE8] hover:shadow-2xl transition duration-300" onclick="location.href='journal.html'">
            <div class="aspect-[16/10] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=800&q=80" 
                     class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-105 transition duration-500">
            </div>
            <div class="p-8 text-center">
                <h2 class="hero-title text-3xl text-[#9D174D] mb-2">Journal 心跳聲</h2>
                <p class="text-gray-500 text-sm mb-4">那些說不出口、讓我臉紅的話</p>
                <span class="inline-block bg-[#FBCFE8] text-[#9D174D] px-8 py-2 rounded-full text-xs font-bold shadow-md">Go read!</span>
            </div>
        </div>

    </section>

    <footer class="py-10 border-t border-gray-100 bg-white text-center text-xs tracking-widest text-gray-400 rounded-t-[2rem]">
        我們的小日常 ✨
    </footer>

    <script>
        // 設定交往起始日期：2026年4月2日
        const startDate = new Date("2026-04-02T00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = now - startDate;

            // 計算 天数
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));

            // 顯示天数
            document.getElementById("days").innerText = days < 100 ? (days < 10 ? "00" + days : "0" + days) : days;
        }

        updateTimer(); // 初始化執行一次
    </script>
</body>
</html>
