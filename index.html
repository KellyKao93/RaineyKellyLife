<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together | 我們的小世界</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入更活潑的字體：Dela Gothic One (日系可愛風標題) and Noto Sans TC */
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; }
        h1, .timer-label { font-family: 'Dela Gothic One', sans-serif; }
        .timer-num { font-family: 'Dela Gothic One', sans-serif; }

        /* 秒數跳動動畫 */
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .pulse-sec {
            animation: pulse-red 1s infinite;
        }

        /* 奶油黃背景 */
        body { background-color: #FEFDF5; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="flex justify-between items-center px-8 py-6 tracking-wide text-md">
        <div class="font-bold text-2xl text-[#FF8A8A] flex items-center">
            <span>❤️ Our Love</span>
        </div>
        <div class="space-x-4 flex">
            <a href="index.html" class="px-4 py-2 bg-[#FF8A8A] text-white rounded-full text-sm shadow-md">Home</a>
            <a href="moments.html" class="px-4 py-2 hover:bg-pink-100 rounded-full text-sm transition text-gray-600">Moments</a>
            <a href="journal.html" class="px-4 py-2 hover:bg-pink-100 rounded-full text-sm transition text-gray-600">Journal</a>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 mb-16 mt-8">
        <div class="bg-white p-10 md:p-16 rounded-[2rem] shadow-xl text-center border-4 border-[#BAE6FD]">
            
            <h1 class="text-4xl md:text-5xl mb-12 text-[#333]">💖 我們在一起...</h1>
            
            <div class="flex flex-wrap justify-center gap-6 md:gap-10 text-center">
                <div class="flex flex-col items-center">
                    <div class="w-28 h-28 md:w-36 md:h-36 bg-[#BAE6FD] text-white rounded-full flex items-center justify-center shadow-lg border-4 border-white">
                        <span id="days" class="timer-num text-5xl md:text-6xl">00</span>
                    </div>
                    <p class="timer-label text-sm mt-3 text-gray-500 tracking-wider">Days</p>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-28 h-28 md:w-36 md:h-36 bg-[#FBCFE8] text-white rounded-full flex items-center justify-center shadow-lg border-4 border-white">
                        <span id="hours" class="timer-num text-5xl md:text-6xl">00</span>
                    </div>
                    <p class="timer-label text-sm mt-3 text-gray-500 tracking-wider">Hours</p>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-28 h-28 md:w-36 md:h-36 bg-[#A7F3D0] text-white rounded-full flex items-center justify-center shadow-lg border-4 border-white">
                        <span id="minutes" class="timer-num text-5xl md:text-6xl">00</span>
                    </div>
                    <p class="timer-label text-sm mt-3 text-gray-500 tracking-wider">Mins</p>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-28 h-28 md:w-36 md:h-36 bg-[#FF8A8A] text-white rounded-full flex items-center justify-center shadow-lg border-4 border-white pulse-sec">
                        <span id="seconds" class="timer-num text-5xl md:text-6xl">00</span>
                    </div>
                    <p class="timer-label text-sm mt-3 text-[#FF8A8A] tracking-wider font-bold">Secs</p>
                </div>
            </div>

            <p class="mt-12 text-md text-gray-400 font-medium">Since 2026.04.02 — 這是我們故事的開始 ✨</p>
        </div>
    </header>

    <section class="max-w-5xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-10 pb-20">
        
        <div class="group cursor-pointer bg-white rounded-3xl shadow-lg overflow-hidden border-2 border-transparent hover:border-[#BAE6FD] hover:shadow-2xl transition duration-300" onclick="location.href='moments.html'">
            <div class="aspect-[16/10] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80" 
                     class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
            </div>
            <div class="p-6 text-center">
                <h2 class="timer-label text-2xl text-[#0369A1] mb-2">Moments 閃照區</h2>
                <p class="text-gray-500 text-sm mb-4">紀錄每一場爬山與馬拉松的汗水</p>
                <span class="inline-block bg-[#BAE6FD] text-[#0369A1] px-6 py-2 rounded-full text-xs font-bold shadow">Go check!</span>
            </div>
        </div>

        <div class="group cursor-pointer bg-white rounded-3xl shadow-lg overflow-hidden border-2 border-transparent hover:border-[#FBCFE8] hover:shadow-2xl transition duration-300" onclick="location.href='journal.html'">
            <div class="aspect-[16/10] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=800&q=80" 
                     class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
            </div>
            <div class="p-6 text-center">
                <h2 class="timer-label text-2xl text-[#9D174D] mb-2">Journal 心跳聲</h2>
                <p class="text-gray-500 text-sm mb-4">那些說不出口、讓我臉紅的話</p>
                <span class="inline-block bg-[#FBCFE8] text-[#9D174D] px-6 py-2 rounded-full text-xs font-bold shadow">Go read!</span>
            </div>
        </div>

    </section>

    <footer class="py-10 border-t border-gray-100 bg-white text-center text-xs tracking-widest text-gray-400 rounded-t-[2rem]">
        ❤️ 我們的小日常 紀錄網頁 ✨
    </footer>

    <script>
        const startDate = new Date("2026-04-02T00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = now - startDate;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
