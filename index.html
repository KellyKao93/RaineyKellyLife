<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story | 生活紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Noto+Sans+TC:wght@300;400&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        h1, h2, .timer-num { font-family: 'Playfair Display', serif; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1516589174184-c68526516280?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-[#F9F9F7] text-[#333]">

    <nav class="flex justify-between items-center px-10 py-8 uppercase tracking-widest text-sm font-light">
        <div class="font-bold text-lg italic">The Archive.</div>
        <div class="space-x-8">
            <a href="index.html" class="border-b border-black">Home</a>
            <a href="moments.html" class="hover:text-gray-500 transition">Moments</a>
            <a href="journal.html" class="hover:text-gray-500 transition">Journal</a>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 mb-20">
        <div class="hero-bg h-[70vh] flex flex-col items-center justify-center text-white shadow-2xl">
            <p class="text-sm tracking-[0.4em] mb-6 uppercase opacity-80">We have been together for</p>
            
            <div class="flex space-x-6 md:space-x-12 text-center">
                <div>
                    <span id="days" class="timer-num text-5xl md:text-8xl">00</span>
                    <p class="text-xs tracking-widest mt-2 uppercase">Days</p>
                </div>
                <div>
                    <span id="hours" class="timer-num text-5xl md:text-8xl">00</span>
                    <p class="text-xs tracking-widest mt-2 uppercase">Hours</p>
                </div>
                <div>
                    <span id="minutes" class="timer-num text-5xl md:text-8xl">00</span>
                    <p class="text-xs tracking-widest mt-2 uppercase">Mins</p>
                </div>
                <div>
                    <span id="seconds" class="timer-num text-5xl md:text-8xl text-red-300">00</span>
                    <p class="text-xs tracking-widest mt-2 uppercase">Secs</p>
                </div>
            </div>

            <p class="mt-10 italic text-lg opacity-90">Since April 2, 2026</p>
        </div>
    </header>

    <section class="max-w-5xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-16 pb-24">
        <div class="group cursor-pointer" onclick="location.href='moments.html'">
            <div class="overflow-hidden bg-gray-200 aspect-[4/5] mb-6">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80" 
                     class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-105 transition duration-700">
            </div>
            <h2 class="text-3xl mb-2 text-center md:text-left">Our Moments</h2>
            <button class="border-b border-black pb-1 text-xs font-bold tracking-widest block mx-auto md:mx-0">VIEW ALBUM</button>
        </div>

        <div class="group cursor-pointer" onclick="location.href='journal.html'">
            <div class="overflow-hidden bg-gray-200 aspect-[4/5] mb-6">
                <img src="https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=800&q=80" 
                     class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-105 transition duration-700">
            </div>
            <h2 class="text-3xl mb-2 text-center md:text-left">Daily Journal</h2>
            <button class="border-b border-black pb-1 text-xs font-bold tracking-widest block mx-auto md:mx-0">READ STORIES</button>
        </div>
    </section>

    <footer class="py-12 border-t border-gray-200 text-center text-xs tracking-widest text-gray-400">
        &copy; 2026 OUR LOVE ARCHIVE.
    </footer>

    <script>
        // 設定交往起始日期：2026年4月2日
        const startDate = new Date("2026-04-02T00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = now - startDate;

            // 計算 天、時、分、秒
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // 顯示結果，如果數字小於 10 則補 0
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        // 每秒更新一次
        setInterval(updateTimer, 1000);
        updateTimer(); // 初始化執行一次
    </script>
</body>
</html>
