<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR ALBUM | Rainey and Kelly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FEFDF5; }
        .hero-title { font-family: 'Dela Gothic One', sans-serif; }
        .date-font { font-family: 'Playfair Display', serif; }
        
        /* 圖片懸浮縮放效果 */
        .photo-card img {
            transition: transform 0.5s ease;
        }
        .photo-card:hover img {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="text-gray-800">

    <nav class="flex flex-col md:flex-row justify-between items-center px-6 md:px-10 py-6 gap-4">
        <div class="font-bold text-xl md:text-2xl text-[#FF8A8A] italic">
            Rainey and Kelly Story.
        </div>
        <div class="flex space-x-2 md:space-x-4">
            <a href="index.html" class="px-4 md:px-6 py-2 hover:bg-pink-100 rounded-full text-xs md:text-sm transition text-gray-600 font-medium">Home</a>
            <a href="Album.html" class="px-4 md:px-6 py-2 bg-[#FF8A8A] text-white rounded-full text-xs md:text-sm shadow-md font-medium">Album</a>
            <a href="Diary.html" class="px-4 md:px-6 py-2 hover:bg-pink-100 rounded-full text-xs md:text-sm transition text-gray-600 font-medium">Diary</a>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto px-4 mb-8 mt-4 md:mt-8 text-center">
        <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-lg border-4 border-[#BAE6FD]">
            <h1 class="hero-title text-4xl md:text-6xl text-[#BAE6FD] mb-4">ALBUM</h1>
            <p class="text-gray-400 tracking-widest text-sm md:text-base font-medium">
                集結了我們所有臉紅心跳的瞬間 ✨
            </p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="photo-card bg-white p-4 rounded-3xl shadow-md border-2 border-transparent hover:border-[#FF8A8A] transition-all">
                <div class="aspect-square overflow-hidden rounded-2xl mb-4">
                    <img src="https://images.unsplash.com/photo-1516589174184-c68526516280?auto=format&fit=crop&w=800&q=80" alt="Memory" class="w-full h-full object-cover">
                </div>
                <div class="text-center">
                    <span class="date-font text-[#FF8A8A] text-lg font-bold">2026.04.02</span>
                    <p class="text-gray-500 text-sm mt-1">故事開始的那一天</p>
                </div>
            </div>

            <div class="photo-card bg-white p-4 rounded-3xl shadow-md border-2 border-transparent hover:border-[#BAE6FD] transition-all">
                <div class="aspect-square overflow-hidden rounded-2xl mb-4">
                    <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80" alt="Memory" class="w-full h-full object-cover">
                </div>
                <div class="text-center">
                    <span class="date-font text-[#BAE6FD] text-lg font-bold">First Trip</span>
                    <p class="text-gray-500 text-sm mt-1">一起去爬 Matcha Mountain 🍵</p>
                </div>
            </div>

            <div class="photo-card bg-white p-4 rounded-3xl shadow-md border-2 border-transparent hover:border-[#FBCFE8] transition-all">
                <div class="aspect-square overflow-hidden rounded-2xl mb-4">
                    <img src="https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=800&q=80" alt="Memory" class="w-full h-full object-cover">
                </div>
                <div class="text-center">
                    <span class="date-font text-[#FBCFE8] text-lg font-bold">Running Day</span>
                    <p class="text-gray-500 text-sm mt-1">我們跑完的第一場馬拉松 🏃‍♀️</p>
                </div>
            </div>

            </div>
    </main>

    <footer class="py-8 bg-white text-center text-[10px] tracking-widest text-gray-400 rounded-t-[2rem]">
        ❤️ 我們的小日常 ✨ <br>
        &copy; 2026 Rainey and Kelly. 保留所有權利。
    </footer>

</body>
</html>
